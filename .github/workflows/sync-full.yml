name: Sync packages (full refresh)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

concurrency:
  group: sync-packages
  cancel-in-progress: false

jobs:
  full:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        brand: [jai, odin]
    steps:
      - name: Trigger full refresh for ${{ matrix.brand }}
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          BRAND: ${{ matrix.brand }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$SYNC_SECRET" ]; then
            echo "SYNC_URL and SYNC_SECRET repository secrets must be set." >&2
            exit 1
          fi
          target="$SYNC_URL?full=1&brand=$BRAND"
          echo "Triggering $target"
          http_code=$(curl -sS -o /tmp/sync-out.json -w "%{http_code}" \
            --max-time 800 \
            -X POST "$target" \
            -H "Authorization: Bearer $SYNC_SECRET" \
            -H "Content-Type: application/json")
          echo "HTTP $http_code"
          cat /tmp/sync-out.json
          echo
          [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]
